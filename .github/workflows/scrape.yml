name: Daily scrape

on:
  schedule:
    - cron: "0 22 * * *"  # 22:00 UTC = midnight Danish time (summer)
  workflow_dispatch:        # allow manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install playwright patchright streamlit altair pandas
          playwright install chromium
          patchright install chromium

      - name: Run scraper and results
        run: python scraper_auto.py

      - name: Commit updated database
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/predictions.db
          git diff --cached --quiet || git commit -m "chore: update predictions database [skip ci]"
          git push

      - name: Notify
        if: always()
        run: python notify.py
